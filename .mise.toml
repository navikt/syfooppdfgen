[tasks.dev]
description = "Start syfooppdfgen lokalt med Docker Compose"
run = "docker compose up"

[tasks.dev-detached]
description = "Start syfooppdfgen lokalt i bakgrunnen"
run = "docker compose up -d"

[tasks.stop]
description = "Stopp lokal syfooppdfgen"
run = "docker compose down"

[tasks.build]
description = "Bygg Docker-imaget for syfooppdfgen"
run = "docker build -t syfooppdfgen ."

[tasks.open-example-pdf]
description = "Åpne en lokal eksempel-PDF i nettleseren"
run = "open http://localhost:9091/api/v1/genpdf/oppfolgingsplan/oppfolgingsplan_v1"
